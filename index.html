            border: 4px ridge #5d554a; 
            padding: 20px;

            text-align: center; 
            margin-bottom: 20px;

            height: 12px; 
            background: linear-gradient(90deg, #ff981f, #ffc107, #ff0000, #ffc107, #ff981f); 
            background-size: 400% 100%; 
            animation: fire-move 2s linear infinite; 
            border-radius: 5px;
            box-shadow: 0 0 10px #ffc107; 
        }
        @keyframes fire-move { 0% { background-position: 0% 0%; } 100% { background-position: 100% 0%; } }

        h1 { color: #ffc107; text-transform: uppercase; margin-top: 0; }
        a { color: #ff981f; text-decoration: none; }

        th { background-color: #3b362d; color: #ffc107; padding: 10px; border: 1px solid #5d554a; }
